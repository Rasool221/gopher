server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Without this, `return 302 /path` sends `Location: http://localhost/path`
    # (no port), and clients follow it to :80. Off makes nginx send the path
    # as-is and the client resolves it against the request URL, preserving :8080.
    absolute_redirect off;

    location / {
        try_files $uri $uri/ $uri.html =404;
        autoindex off;
    }

    location = /redirect-once {
        return 302 /about.html;
    }

    location = /redirect-chain {
        return 302 /redirect-chain-2;
    }
    location = /redirect-chain-2 {
        return 302 /contact.html;
    }

    location = /gone {
        return 410;
    }
}
